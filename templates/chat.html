<!DOCTYPE html>
<html>
<head>
    <title>AI Trainer Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5 d-flex justify-content-center">

    <div class="container-box col-md-6">

        <h2>Chat with Trainer</h2>

<form method="POST">
    <input type="text" name="message" placeholder="Ask anything..." required>
    <button type="submit">Send</button>
</form>

<hr>

{% for c in chat %}
    <p><b>You:</b> {{c.user}}</p>
    <p><b>AI:</b> {{c.bot}}</p>
    <hr>
{% endfor %}

        <a href="/planner"><button>⬅ Back</button></a>

    </div>

</div>

</body>
</html>
